<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi Joy</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Joy">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#2f80ed">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:12px;
  color:#222;
}

h1{
  text-align:center;
  font-size:24px;
  line-height:1.2;
  margin:16px 0 20px;
}

h2{
  font-size:19px;
  margin:0 0 14px;
  text-align:left;
}

.card{
  background:white;
  border-radius:18px;
  padding:16px;
  margin:14px 0;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
}

label{
  display:block;
  margin-top:13px;
  margin-bottom:5px;
  font-size:15px;
  font-weight:700;
}

input{
  width:100%;
  height:46px;
  padding:10px 12px;
  border:1px solid #ccd2da;
  border-radius:12px;
  font-size:18px;
  background:#fff;
}

input[type="date"]{
  appearance:none;
  -webkit-appearance:none;
}

button{
  width:100%;
  padding:14px 16px;
  border:0;
  border-radius:14px;
  background:#2f80ed;
  color:white;
  font-size:16px;
  font-weight:700;
  margin-top:12px;
  cursor:pointer;
}

button.red{
  background:#d9534f;
}

button:active{
  transform:scale(.98);
}

canvas{
  width:100% !important;
  max-height:340px;
  background:white;
  border-radius:16px;
}

.small{
  font-size:13px;
  color:#666;
  line-height:1.4;
}

#summary,
#history{
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}

table{
  width:100%;
  min-width:720px;
  border-collapse:collapse;
  font-size:13px;
}

th,
td{
  border-bottom:1px solid #ddd;
  padding:9px 8px;
  text-align:center;
  white-space:nowrap;
}

th{
  background:#eef1f5;
  font-weight:700;
}

tr:active{
  background:#eef6ff;
}

@media (min-width:700px){
  body{padding:24px}

  .card{
    max-width:950px;
    margin:18px auto;
  }

  button{
    width:auto;
    min-width:220px;
    margin-right:8px;
  }
}
</style>
</head>

<body>

<h1>Suivi quotidien de Joy</h1>

<div class="card">
<h2>Saisie du jour</h2>

<label>Date</label>
<input type="date" id="date">

<div id="form"></div>

<button onclick="saveDay()">Enregistrer / mettre à jour</button>
<button onclick="loadFirst7Days()">Préremplir les 7 premiers jours</button>
<button onclick="exportJSON()">Exporter JSON</button>
<button class="red" onclick="resetAll()">Tout effacer</button>

<p class="small">Les données restent enregistrées sur cet iPhone via le navigateur.</p>
</div>

<div class="card">
<h2>Graphique</h2>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h2>Cumuls et moyennes</h2>
<div id="summary"></div>
</div>

<div class="card">
<h2>Historique</h2>
<div id="history"></div>
</div>

<script>
const criteres = [
  ["douleur","Douleur / inconfort",true],
  ["appetit","Appétit",false],
  ["hydratation","Hydratation",false],
  ["mobilite","Mobilité",false],
  ["hygiene","Hygiène",false],
  ["environnement","Intérêt pour l’environnement",false],
  ["interactions","Interactions avec toi",false],
  ["plaisir","Moments de plaisir",false],
  ["anxiete","Anxiété / confusion",true],
  ["bonheur","Bonheur global de la journée",false]
];

const first7Days = [
  {date:"2026-06-10", douleur:7.5, appetit:7.5, hydratation:5.5, mobilite:6, hygiene:6, environnement:6, interactions:7, plaisir:4, anxiete:7.8, bonheur:6},
  {date:"2026-06-11", douleur:7.5, appetit:7.2, hydratation:5.5, mobilite:5.8, hygiene:6, environnement:6, interactions:7, plaisir:4, anxiete:7.8, bonheur:6},
  {date:"2026-06-12", douleur:7.5, appetit:7.2, hydratation:5.5, mobilite:5.9, hygiene:6, environnement:6, interactions:7, plaisir:4, anxiete:7.9, bonheur:6},
  {date:"2026-06-13", douleur:7.5, appetit:7.2, hydratation:5.5, mobilite:5.9, hygiene:6, environnement:6, interactions:7, plaisir:4, anxiete:7.9, bonheur:6},
  {date:"2026-06-14", douleur:7.5, appetit:7.2, hydratation:5.5, mobilite:5.9, hygiene:6, environnement:6, interactions:7, plaisir:4, anxiete:7.9, bonheur:6},
  {date:"2026-06-15", douleur:7.5, appetit:7.2, hydratation:5.5, mobilite:5.9, hygiene:6, environnement:6, interactions:7, plaisir:4, anxiete:7.9, bonheur:6},
  {date:"2026-06-16", douleur:6, appetit:6, hydratation:6, mobilite:5, hygiene:5, environnement:5.5, interactions:5, plaisir:4, anxiete:5, bonheur:5},
  {date:"2026-06-17", douleur:6, appetit:6, hydratation:6, mobilite:5.5, hygiene:5.5, environnement:5.5, interactions:6, plaisir:4, anxiete:4, bonheur:5},
  {date:"2026-06-18", douleur:5.5, appetit:6, hydratation:6, mobilite:4.5, hygiene:5.5, environnement:6, interactions:6, plaisir:5, anxiete:7, bonheur:6.5},
  {date:"2026-06-19", douleur:6, appetit:6.5, hydratation:6, mobilite:5, hygiene:6, environnement:6, interactions:6, plaisir:5, anxiete:5, bonheur:5.5},
  {date:"2026-06-20", douleur:6, appetit:6.5, hydratation:6, mobilite:5, hygiene:6, environnement:6, interactions:6, plaisir:5, anxiete:5, bonheur:5.5},
  {date:"2026-06-21", douleur:6, appetit:6, hydratation:6, mobilite:6, hygiene:6, environnement:6, interactions:6, plaisir:4.5, anxiete:5, bonheur:5},
  {date:"2026-06-22", douleur:6, appetit:6, hydratation:6, mobilite:6.5, hygiene:6, environnement:6, interactions:6, plaisir:5, anxiete:5, bonheur:6},
  {date:"2026-06-23", douleur:6, appetit:6, hydratation:6, mobilite:5.5, hygiene:5.5, environnement:6, interactions:6, plaisir:4.5, anxiete:5, bonheur:5},
  {date:"2026-06-24", douleur:5.5, appetit:6, hydratation:6, mobilite:6, hygiene:6, environnement:6, interactions:6, plaisir:5, anxiete:5.5, bonheur:6},
  {date:"2026-06-25", douleur:5.5, appetit:6, hydratation:6, mobilite:6, hygiene:6, environnement:6, interactions:6, plaisir:5, anxiete:5.5, bonheur:6},
  {date:"2026-06-26", douleur:5.5, appetit:6, hydratation:6, mobilite:6, hygiene:6, environnement:6, interactions:6, plaisir:5, anxiete:5.5, bonheur:6},
  {date:"2026-06-27", douleur:5.5, appetit:6, hydratation:6, mobilite:6, hygiene:6, environnement:6, interactions:6, plaisir:5, anxiete:5, bonheur:6},
  {date:"2026-06-28", douleur:4, appetit:6, hydratation:5.5, mobilite:4, hygiene:5, environnement:5, interactions:5, plaisir:5, anxiete:8, bonheur:6},
  {date:"2026-06-29", douleur:7, appetit:6, hydratation:6, mobilite:5.5, hygiene:6, environnement:6, interactions:5.6, plaisir:6, anxiete:7, bonheur:6},
  {date:"2026-06-30", douleur:7.5, appetit:6, hydratation:6, mobilite:5, hygiene:6, environnement:6, interactions:5.6, plaisir:6, anxiete:7.3, bonheur:6},
  {date:"2026-07-01", douleur:6, appetit:7, hydratation:6, mobilite:5.5, hygiene:5, environnement:5, interactions:5.5, plaisir:4.5, anxiete:5, bonheur:5}
];

let chart;

document.getElementById("date").valueAsDate = new Date();

document.getElementById("form").innerHTML = criteres.map(c => `
  <label>${c[1]}</label>
  <input type="number" id="${c[0]}" min="0" max="10" step="0.1">
`).join("");

function getData(){
  return JSON.parse(localStorage.getItem("joyData")) || [];
}

function setData(data){
  localStorage.setItem("joyData", JSON.stringify(data));
}

function getValue(d,id){
  const v = parseFloat(d[id]);
  return isNaN(v) ? null : v;
}

function displayValue(d,id){
  const v = getValue(d,id);
  return v === null ? "" : v;
}

function totalScore(d){
  return criteres.reduce((sum,[id]) => {
    const v = getValue(d,id);
    return sum + (v === null ? 0 : v);
  }, 0).toFixed(1);
}

function saveDay(){
  const date = document.getElementById("date").value;
  if(!date) return alert("Choisis une date.");

  const entry = {date};

  for(const [id] of criteres){
    const v = parseFloat(document.getElementById(id).value);
    if(isNaN(v) || v < 0 || v > 10){
      return alert("Toutes les notes doivent être entre 0 et 10.");
    }
    entry[id] = v;
  }

  let data = getData().filter(d => d.date !== date);
  data.push(entry);
  data.sort((a,b) => new Date(a.date) - new Date(b.date));

  setData(data);
  render();
}

function loadFirst7Days(){
  let data = getData();

  first7Days.forEach(day => {
    data = data.filter(d => d.date !== day.date);
    data.push(day);
  });

  data.sort((a,b) => new Date(a.date) - new Date(b.date));
  setData(data);
  render();

  alert("Les données historiques ont été ajoutées. Tu peux les modifier dans l’historique en ressaisissant la même date.");
}

function resetAll(){
  if(confirm("Effacer toutes les données ?")){
    localStorage.removeItem("joyData");
    render();
  }
}

function exportJSON(){
  const data = getData();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "joy-data.json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function render(){
  const data = getData();
  renderChart(data);
  renderSummary(data);
  renderHistory(data);
}

function renderChart(data){
  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type:"line",
    data:{
      labels:data.map(d => d.date),
      datasets:[
        {label:"Bonheur", data:data.map(d => getValue(d,"bonheur")), tension:.3},
        {label:"Douleur", data:data.map(d => getValue(d,"douleur")), tension:.3},
        {label:"Anxiété", data:data.map(d => getValue(d,"anxiete")), tension:.3},
        {label:"Mobilité", data:data.map(d => getValue(d,"mobilite")), tension:.3},
        {label:"Plaisir", data:data.map(d => getValue(d,"plaisir")), tension:.3}
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      scales:{
        y:{
          min:0,
          max:10
        }
      }
    }
  });
}

function renderSummary(data){
  if(!data.length){
    document.getElementById("summary").innerHTML = "Aucune donnée.";
    return;
  }

  let html = `<p><strong>Nombre de jours suivis :</strong> ${data.length}</p>
  <table>
  <tr>
    <th>Critère</th>
    <th>Cumul</th>
    <th>Moyenne</th>
    <th>Lecture</th>
  </tr>`;

  criteres.forEach(([id,label,inverse]) => {
    const valeurs = data.map(d => getValue(d,id)).filter(v => v !== null);
    const cumul = valeurs.reduce((s,v) => s + v, 0);
    const moy = valeurs.length ? cumul / valeurs.length : null;

    let lecture = "";
    if(moy !== null){
      lecture = inverse
        ? moy >= 7 ? "Vigilance élevée" : moy >= 5 ? "À surveiller" : "Correct"
        : moy < 5 ? "Vigilance élevée" : moy < 7 ? "À surveiller" : "Correct";
    }

    html += `<tr>
      <td>${label}</td>
      <td>${valeurs.length ? cumul.toFixed(1) : ""}</td>
      <td>${moy !== null ? moy.toFixed(1) + "/10" : ""}</td>
      <td>${lecture}</td>
    </tr>`;
  });

  html += `</table>`;
  document.getElementById("summary").innerHTML = html;
}

function renderHistory(data){
  if(!data.length){
    document.getElementById("history").innerHTML = "Aucun historique.";
    return;
  }

  let html = `<table>
  <tr>
    <th>Date</th>
    <th>Douleur</th>
    <th>Appétit</th>
    <th>Hydrat.</th>
    <th>Mobilité</th>
    <th>Hygiène</th>
    <th>Environ.</th>
    <th>Interact.</th>
    <th>Plaisir</th>
    <th>Anxiété</th>
    <th>Bonheur</th>
    <th>Total /100</th>
  </tr>`;

  data.forEach(d => {
    html += `<tr onclick="editDay('${d.date}')">
      <td>${d.date}</td>
      <td>${displayValue(d,"douleur")}</td>
      <td>${displayValue(d,"appetit")}</td>
      <td>${displayValue(d,"hydratation")}</td>
      <td>${displayValue(d,"mobilite")}</td>
      <td>${displayValue(d,"hygiene")}</td>
      <td>${displayValue(d,"environnement")}</td>
      <td>${displayValue(d,"interactions")}</td>
      <td>${displayValue(d,"plaisir")}</td>
      <td>${displayValue(d,"anxiete")}</td>
      <td>${displayValue(d,"bonheur")}</td>
      <td>${totalScore(d)}</td>
    </tr>`;
  });

  html += `</table>
  <p class="small">Appuie sur une ligne pour la modifier.</p>`;

  document.getElementById("history").innerHTML = html;
}

function editDay(date){
  const d = getData().find(x => x.date === date);
  if(!d) return;

  document.getElementById("date").value = d.date;

  criteres.forEach(([id]) => {
    document.getElementById(id).value = d[id];
  });

  window.scrollTo({top:0, behavior:"smooth"});
}

render();
</script>

<script src="joy-ai.js"></script>

</body>
</html>
